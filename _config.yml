name: APIs.io Providers
description: Browse API service providers across the APIs.io network.
image: https://apis.io/assets/branding/apisio-social-card.png
url: https://providers.apis.io

node: website
nav_active: providers

keywords:
  - APIs
  - Search
  - Discovery

exclude: [".rvmrc", ".rbenv-version", "README.md", "Rakefile", "changelog.md", "scripts"]
include: [".well-known"]

github_org: api-search
github_repo: providers

collections:
  providers:
    output: true
    permalink: /providers/:path/

defaults:
  - scope:
      path: ""
      type: providers
    values:
      layout: provider
